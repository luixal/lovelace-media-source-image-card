name: Copy to dist

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: copy file
      uses: canastro/copy-file-action@master
      with:
        source: "./src"
        target: "./dist"
        flags: "-r"